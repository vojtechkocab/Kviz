<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7cc7b5" />
    <meta
      name="description"
      content="Obrázková PWA aplikace s mluvenými úkoly pro předškoláky."
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Hrátky pro předškoláky</title>
  </head>
  <body>
    <main class="app-shell" id="app">
      <section class="topbar" aria-label="Ovládání">
        <button class="icon-button" id="homeButton" type="button" aria-label="Domů">
          <span aria-hidden="true">⌂</span>
        </button>
        <div class="progress" aria-label="Postup">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <strong id="progressLabel">1/24</strong>
        </div>
        <button class="icon-button speak-button" id="speakButton" type="button" aria-label="Přečíst úkol">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
            <path d="M16 8.5c1.2 1.1 1.2 5.9 0 7"></path>
            <path d="M18.6 6c2.2 2.2 2.2 9.8 0 12"></path>
          </svg>
        </button>
      </section>

      <section class="start-screen is-active" id="startScreen">
        <div class="mascot" aria-hidden="true">
          <span>☀️</span>
          <span>🎒</span>
          <span>🧸</span>
        </div>
        <h1>Hrátky pro předškoláky</h1>
        <p>Obrázkové úkoly se čtou nahlas. Dítě vybírá jen klepnutím.</p>
        <button class="start-button" id="startButton" type="button">
          <span aria-hidden="true">▶</span>
          Začít
        </button>
      </section>

      <section class="task-screen" id="taskScreen" aria-live="polite">
        <p class="sr-only" id="spokenInstruction"></p>
        <div class="task-stage" id="taskStage"></div>
        <div class="answer-grid" id="answerGrid"></div>
      </section>

      <section class="finish-screen" id="finishScreen">
        <div class="finish-mark" aria-hidden="true">★</div>
        <h1>Hotovo</h1>
        <p id="finishText"></p>
        <button class="start-button" id="againButton" type="button">
          <span aria-hidden="true">↻</span>
          Znovu
        </button>
      </section>

      <div class="toast" id="toast" hidden></div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
